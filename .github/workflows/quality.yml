name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Run test suite
        run: python -m pytest -q
      - name: Verify independently regenerated golden values
        run: python tools/regen_expected.py --check

  cli-smoke:
    name: Installed CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Produce a fixed-epoch golden CLI report
        run: |
          mkdir -p build/ci-e2e
          openpharmastability analyze examples/assay_3batch.csv \
            --condition "25C/60RH" --attribute assay --source-epoch 1700000000 \
            --output build/ci-e2e/report.html
      - name: Verify CLI artifacts and decision record
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("build/ci-e2e")
          html = root / "report.html"
          record_path = root / "report.json"
          plot = root / "confidence_plot.png"
          assert all(path.is_file() and path.stat().st_size > 0 for path in (html, record_path, plot))
          assert plot.read_bytes().startswith(b"\x89PNG\r\n\x1a\n")
          record = json.loads(record_path.read_text(encoding="utf-8"))
          expected = {
              "condition": "25C/60RH",
              "limiting_attribute": "assay",
              "model": "common_slope_batch_intercepts",
              "poolability": "partial",
              "governing_batch": "B2",
              "supported_shelf_life_months": 17,
              "guidance_profile": "Q1A_R2+Q1E",
              "guidance_status": "effective",
          }
          for key, value in expected.items():
              assert record[key] == value, (key, record[key], value)
          report = html.read_text(encoding="utf-8")
          assert "confidence_plot.png" in report
          assert "decision-support" in report
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cli-smoke-report
          path: build/ci-e2e/
          if-no-files-found: error

  site-sync:
    name: Public site synchronization
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify deploy folder is synchronized
        run: |
          node tools/sync-site.mjs
          git diff --exit-code -- site
